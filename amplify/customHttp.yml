customHeaders:
  - pattern: "**/*.html"
    headers:
      - key: "Cache-Control"
        value: "no-cache"

  - pattern: "**/*.+(js|css|woff|woff2|ttf|otf|eot|ico|png|jpg|jpeg|gif|webp|svg|avif)"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=86400"

  - pattern: "_astro/**"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"
